name: Docker image

on:
  push:
    branches:
    - master
    paths:
    - 'scripts/Dockerfile'
    - 'scripts/Dockerfile.cgct'
    - 'scripts/properties.sh'
    - 'scripts/setup-android-sdk.sh'
    - 'scripts/setup-clang.sh'
    - 'scripts/setup-ubuntu.sh'
    - 'scripts/setup-cgct.sh'
    - 'scripts/build/termux_download.sh'
    - '.github/workflows/docker_image.yml'
  pull_request:
    paths:
    - 'scripts/Dockerfile'
    - 'scripts/Dockerfile.cgct'
    - 'scripts/properties.sh'
    - 'scripts/setup-android-sdk.sh'
    - 'scripts/setup-clang.sh'
    - 'scripts/setup-ubuntu.sh'
    - 'scripts/setup-cgct.sh'
    - 'scripts/build/termux_download.sh'
    - '.github/workflows/docker_image.yml'
  schedule:
    - cron:  '0 2 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.repository == 'crotm/termux-builder'
    steps:
    - name: Clone repository
      uses: actions/checkout@v7

    # Skip building the Docker image on scheduled runs if the last successful
    # image build (the one tagged "latest") is less than IMAGE_MIN_INTERVAL_DAYS old.
    - name: Optionally skip building image
      if: github.event_name == 'schedule'
      id: skip-build
      env:
        IMAGE_MIN_INTERVAL_DAYS: 30
      run: |
        LAST_TIMESTAMP=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
         -H "Accept: application/vnd.github+json" \
         "https://api.github.com/users/crotm/packages/container/termux-builder/versions" |
          jq --raw-output 'map(select(.metadata.container.tags | contains(["latest"])))[0].created_at')
        LAST_UNIX_TIME=$(date -d "$LAST_TIMESTAMP" +%s)
        CURRENT_UNIX_TIME=$(date +%s)
        if (( "$CURRENT_UNIX_TIME" - "$LAST_UNIX_TIME" < $IMAGE_MIN_INTERVAL_DAYS*24*60*60 )); then
          echo "Skipping building Docker image: last successful build was done on $LAST_TIMESTAMP (< $IMAGE_MIN_INTERVAL_DAYS days)"
          echo "skip-build=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Build
      if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
      run: |
        docker build --tag excedrin/termux-builder:latest scripts/
        docker tag excedrin/termux-builder:latest ghcr.io/crotm/termux-builder:latest

    - name: Build (CGCT)
      if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
      run: |
        docker build --no-cache --tag excedrin/termux-builder-cgct:latest --file scripts/Dockerfile.cgct scripts/
        docker tag excedrin/termux-builder-cgct:latest ghcr.io/crotm/termux-builder-cgct:latest

    # Verify INSIDE the images (the env vars only exist in the container,
    # not on the runner host) before anything is pushed:
    - name: Verify images
      if: ${{ steps.skip-build.outputs.skip-build != 'true' }}
      run: |
        for img in excedrin/termux-builder:latest excedrin/termux-builder-cgct:latest; do
          echo "=== Verifying $img ==="
          docker run --rm "$img" bash -c '
            set -e
            echo "NDK=$NDK"
            echo "ANDROID_HOME=$ANDROID_HOME"
            LLVM_BIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
            "$LLVM_BIN/clang" --version
            echo "AOSP clang marker: $(cat "$LLVM_BIN/../AndroidVersion.txt")"
            echo "API wrappers: $(ls "$LLVM_BIN" | grep -c -- "-clang$") clang + $(ls "$LLVM_BIN" | grep -c -- "-clang++$") clang++"
            ls -l "$LLVM_BIN/../lib/clang/"
            echo "int main(void){return 0;}" > /tmp/t.c
            "$LLVM_BIN/aarch64-linux-android24-clang" /tmp/t.c -o /tmp/t
            echo "Link test OK"
          '
        done
    - name: Login to GHCR
      if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request' && github.repository == 'crotm/termux-builder' && steps.skip-build.outputs.skip-build != 'true'

      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request' && github.repository == 'crotm/termux-builder' && steps.skip-build.outputs.skip-build != 'true'
      uses: docker/login-action@v4
      with:
        username: excedrin
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Push
      if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request' && github.repository == 'crotm/termux-builder' && steps.skip-build.outputs.skip-build != 'true'
      run: |
        # Define the two full image paths to push
        # We push to GHCR (crotm) and Docker Hub (excedrin)
        IMAGES=(
          "ghcr.io/crotm/termux-builder:latest"
          "ghcr.io/crotm/termux-builder-cgct:latest"
          "excedrin/termux-builder:latest"
          "excedrin/termux-builder-cgct:latest"
        )

        for img in "${IMAGES[@]}"; do
          echo "Pushing $img..."
          for t in 1 2 3; do
            if docker push "$img"; then
              break
            else
              if [ "$t" = "3" ]; then
                echo "Giving up after 3 attempts on $img"
                exit 1
              fi
              echo "Push failed, retrying in 20s..."
              sleep 20
            fi
          done
        done
